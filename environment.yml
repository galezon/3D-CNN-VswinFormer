name: mri_3D_classification_env
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  - tqdm
  - monai
  - nibabel
  - nilearn
  - einops
  - pip
